name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        # Outputs to backend/src/API/wwwroot/dist/ (vite.config.js)
        # Must run before dotnet publish so wwwroot/dist/ is included in the publish output

      # --- Backend ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish API
        run: >
          dotnet publish backend/src/API/AttendanceTracker.API.csproj
          --configuration Release
          --output publish/

      # --- Deploy ---
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: attendancetracker-app-prod
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish/

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore backend/AttendanceTracker.sln

      - name: Build
        run: dotnet build backend/AttendanceTracker.sln --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test backend/AttendanceTracker.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results-backend.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults/
          retention-days: 30

      - name: Publish backend test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: TestResults/**/*.trx
          check_name: Backend Test Results

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            test-results/
            coverage/
          retention-days: 30

      - name: Publish frontend test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/test-results-frontend.xml
          check_name: Frontend Test Results

      - name: Build
        run: npm run build

  publish-to-azure-devops:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download backend test results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backend-test-results
          path: TestResults/

      - name: Download frontend test results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: frontend-test-results
          path: test-results/

      - name: Publish results to Azure DevOps
        env:
          AZURE_DEVOPS_ORG: ${{ vars.AZURE_DEVOPS_ORG }}
          AZURE_DEVOPS_PROJECT: ${{ vars.AZURE_DEVOPS_PROJECT }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BACKEND_TRX: TestResults/test-results-backend.trx
          FRONTEND_XML: test-results/test-results-frontend.xml
        run: python scripts/publish-to-azure-devops.py
